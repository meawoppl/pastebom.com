<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PasteBOM - Interactive BOM Hosting</title>
    <style>
        * { box-sizing: border-box; }
        html { background: #1a1a2e; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0 auto;
            padding: 2rem;
            background: transparent;
            color: #eee;
            min-height: 100vh;
            max-width: 1200px;
        }
        h1 { color: #4ecca3; margin-bottom: 0.5rem; }
        .subtitle { color: #888; margin-bottom: 2rem; }
        .subtitle a { color: #4ecca3; }
        .page-layout {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 2rem;
            align-items: start;
        }
        @media (max-width: 768px) {
            .page-layout {
                grid-template-columns: 1fr;
            }
        }
        .upload-zone {
            border: 2px dashed #4ecca3;
            border-radius: 12px;
            padding: 3rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: #16213e;
        }
        .upload-zone:hover, .upload-zone.dragover {
            border-color: #7effc3;
            background: #1a2744;
        }
        .upload-zone input { display: none; }
        .formats { color: #888; font-size: 0.9rem; margin-top: 1rem; }
        .result {
            margin-top: 2rem;
            padding: 1.5rem;
            background: #16213e;
            border-radius: 8px;
            display: none;
        }
        .result.show { display: block; }
        .result a { color: #4ecca3; word-break: break-all; font-size: 1.1rem; }
        .result .meta { color: #888; margin-top: 0.5rem; font-size: 0.9rem; }
        .error { background: #3d1a1a; border: 1px solid #ff4444; }
        .loading { opacity: 0.6; pointer-events: none; }
        button {
            background: #4ecca3;
            color: #1a1a2e;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1rem;
        }
        button:hover { background: #7effc3; }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #4ecca3;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .history {
            margin-top: 2rem;
            padding: 1.5rem;
            background: #16213e;
            border-radius: 8px;
        }
        .history h2 {
            color: #4ecca3;
            font-size: 1.1rem;
            margin: 0 0 1rem 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .history-clear {
            background: transparent;
            color: #888;
            font-size: 0.8rem;
            padding: 0.25rem 0.5rem;
            margin: 0;
        }
        .history-clear:hover { color: #ff6b6b; background: transparent; }
        .history-list { list-style: none; padding: 0; margin: 0; }
        .history-list li {
            padding: 0.75rem 0;
            border-bottom: 1px solid #2a2a4e;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }
        .history-list li:last-child { border-bottom: none; }
        .history-list a {
            color: #4ecca3;
            text-decoration: none;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .history-list a:hover { text-decoration: underline; }
        .history-list .history-meta { color: #666; font-size: 0.8rem; white-space: nowrap; }
        .upload-options {
            margin-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            color: #888;
            font-size: 0.9rem;
        }
        .upload-options input[type="checkbox"] {
            accent-color: #4ecca3;
            width: 16px;
            height: 16px;
        }
        .sidebar-section {
            padding: 1.5rem;
            background: #16213e;
            border-radius: 8px;
            position: sticky;
            top: 2rem;
        }
        .sidebar-section h2 {
            color: #4ecca3;
            font-size: 1.1rem;
            margin: 0 0 1rem 0;
        }
        .public-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        .public-table th {
            text-align: left;
            color: #888;
            font-weight: 500;
            padding: 0.5rem 0.5rem;
            border-bottom: 1px solid #2a2a4e;
        }
        .public-table td {
            padding: 0.5rem 0.5rem;
            border-bottom: 1px solid #2a2a4e;
        }
        .public-table tr:last-child td { border-bottom: none; }
        .public-table td a {
            color: #4ecca3;
            text-decoration: none;
            display: block;
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .public-table td a:hover { text-decoration: underline; }
        .public-table .num { text-align: right; color: #aaa; }
        .public-table .age { color: #666; white-space: nowrap; }
        .thumb-cell { width: 60px; padding: 0.25rem 0.5rem; }
        .thumb-img { width: 56px; height: auto; border-radius: 4px; border: 1px solid #2a2a4e; vertical-align: middle; }

        /* PCB mosaic background */
        .pcb-mosaic {
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            display: grid;
            grid-template-columns: repeat(var(--mosaic-cols, 4), 1fr);
            grid-template-rows: repeat(var(--mosaic-rows, 3), 1fr);
            gap: 0;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1.5s ease-in;
        }
        .pcb-mosaic.visible { opacity: 1; }
        .mosaic-cell {
            overflow: hidden;
            position: relative;
        }
        .mosaic-cell img {
            width: 160%;
            height: 160%;
            object-fit: cover;
            position: absolute;
            filter: brightness(0.6) saturate(0.7);
            transition: opacity 2s ease-in-out;
            will-change: transform;
        }
        .mosaic-cell img.fading-out { opacity: 0; }

        @keyframes kb1 {
            0%   { top: -10%; left: -10%; transform: scale(1); }
            100% { top: -20%; left: -25%; transform: scale(1.15); }
        }
        @keyframes kb2 {
            0%   { top: -20%; left: -30%; transform: scale(1.1); }
            100% { top: -5%;  left: -10%; transform: scale(1); }
        }
        @keyframes kb3 {
            0%   { top: -5%;  left: -20%; transform: scale(1.05); }
            100% { top: -25%; left: -5%;  transform: scale(1.2); }
        }
        @keyframes kb4 {
            0%   { top: -25%; left: -5%;  transform: scale(1.15); }
            100% { top: -10%; left: -30%; transform: scale(1.05); }
        }
        @keyframes kb5 {
            0%   { top: -15%; left: -15%; transform: scale(1); }
            100% { top: -5%;  left: -25%; transform: scale(1.18); }
        }
        @keyframes kb6 {
            0%   { top: -5%;  left: -5%;  transform: scale(1.2); }
            100% { top: -20%; left: -20%; transform: scale(1); }
        }

        .pcb-mosaic-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            background: radial-gradient(ellipse at center, rgba(26,26,46,0.75) 0%, rgba(26,26,46,0.92) 100%);
            pointer-events: none;
        }

        body { position: relative; z-index: 2; }
    </style>
</head>
<body>
    <div class="pcb-mosaic" id="pcbMosaic"></div>
    <div class="pcb-mosaic-overlay"></div>

    <h1>PasteBOM <span id="version" style="font-size:0.5em;color:#666"></span></h1>
    <p class="subtitle">Share interactive Bill of Materials and PCB layout viewers.</p>

    <div class="page-layout">
        <div class="main-column">
            <div class="upload-zone" id="dropzone">
                <input type="file" id="fileInput" accept=".kicad_pcb,.json,.brd,.fbrd,.pcbdoc,.zip,.tgz,.tar.gz,.gds,.gds2">
                <p>Drop your PCB file here or click to browse</p>
                <div class="formats">
                    <ul style="text-align: left; display: inline-block; margin: 0.5rem 0 0 0; padding-left: 1.5rem;">
                        <li style="list-style: none; margin-left: -1.5rem; margin-bottom: 0.25rem;">Supported formats:</li>
                        <li>Altium (.PcbDoc)</li>
                        <li>Eagle (.brd, .fbrd)</li>
                        <li>EasyEDA (.json)</li>
                        <li>GDSII (.gds, .gds2)</li>
                        <li>Gerber (.zip)</li>
                        <li>KiCad (.kicad_pcb)</li>
                        <li>ODB++ (.tgz, .zip, .tar.gz)</li>
                    </ul>
                </div>
            </div>
            <div class="upload-options">
                <input type="checkbox" id="secretCheck">
                <label for="secretCheck">Secret (won't appear in public feed)</label>
            </div>

            <div class="result" id="result"></div>
            <div id="recentPublic"></div>
        </div>

        <div class="sidebar">
            <div class="sidebar-section" id="history"></div>
        </div>
    </div>

    <script>
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const result = document.getElementById('result');
        const historyEl = document.getElementById('history');
        const recentEl = document.getElementById('recentPublic');
        const secretCheck = document.getElementById('secretCheck');
        const STORAGE_KEY = 'pastebom_history';
        const MAX_HISTORY = 20;

        function getHistory() {
            try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
            catch { return []; }
        }

        function saveToHistory(entry) {
            const history = getHistory();
            history.unshift({ url: entry.url, filename: entry.filename, created: new Date().toISOString() });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(history.slice(0, MAX_HISTORY)));
            renderHistory();
        }

        function clearHistory() {
            localStorage.removeItem(STORAGE_KEY);
            renderHistory();
        }

        function renderHistory() {
            const history = getHistory();
            if (history.length === 0) { historyEl.innerHTML = ''; return; }
            const items = history.map(h => {
                const date = new Date(h.created).toLocaleDateString();
                return `<li><a href="${h.url}" target="_blank">${h.filename || h.url}</a><span class="history-meta">${date}</span></li>`;
            }).join('');
            historyEl.innerHTML = `
                <h2>Your Pastes (This Device Only) <button class="history-clear" onclick="clearHistory()">Clear</button></h2>
                <ul class="history-list">${items}</ul>`;
        }

        renderHistory();

        function timeAgo(dateStr) {
            const seconds = Math.floor((Date.now() - new Date(dateStr).getTime()) / 1000);
            if (seconds < 60) return 'just now';
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return minutes + 'm ago';
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return hours + 'h ago';
            const days = Math.floor(hours / 24);
            return days + 'd ago';
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        function detectFormat(filename) {
            const name = filename.toLowerCase();
            if (name.endsWith('.kicad_pcb')) return 'KiCad';
            if (name.endsWith('.json')) return 'EasyEDA';
            if (name.endsWith('.brd') || name.endsWith('.fbrd')) return 'Eagle';
            if (name.endsWith('.pcbdoc')) return 'Altium';
            if (name.endsWith('.gds') || name.endsWith('.gds2')) return 'GDSII';
            if (name.endsWith('.tgz') || name.endsWith('.tar.gz')) return 'ODB++';
            if (name.endsWith('.zip')) return 'Gerber/ODB++';
            return '';
        }

        async function loadRecent() {
            try {
                const resp = await fetch('/api/recent');
                const entries = await resp.json();
                if (!entries.length) { recentEl.innerHTML = ''; return; }
                const rows = entries.map(e => {
                    const ago = timeAgo(e.created);
                    const size = e.file_size != null ? formatSize(e.file_size) : '';
                    const fmt = detectFormat(e.filename);
                    return `<tr>
                        <td class="thumb-cell"><a href="/b/${e.id}" target="_blank"><img src="/b/${e.id}/thumb.svg" class="thumb-img" loading="lazy" alt=""></a></td>
                        <td><a href="/b/${e.id}" target="_blank">${e.filename}</a></td>
                        <td>${fmt}</td>
                        <td class="num">${e.components}</td>
                        <td class="num">${size}</td>
                        <td class="age">${ago}</td>
                    </tr>`;
                }).join('');
                recentEl.innerHTML = `
                    <h2>Public Pastes</h2>
                    <table class="public-table">
                        <thead><tr>
                            <th></th>
                            <th>Name</th>
                            <th>Format</th>
                            <th class="num">Components</th>
                            <th class="num">Size</th>
                            <th>Age</th>
                        </tr></thead>
                        <tbody>${rows}</tbody>
                    </table>`;
            } catch { recentEl.innerHTML = ''; }
        }
        loadRecent();

        fetch('/health').then(r => r.json()).then(d => {
            document.getElementById('version').textContent = 'v' + d.version;
        }).catch(() => {});

        // PCB mosaic background
        (async function initMosaic() {
            const mosaic = document.getElementById('pcbMosaic');
            const KB_ANIMS = ['kb1','kb2','kb3','kb4','kb5','kb6'];
            const CYCLE_INTERVAL = 8000; // ms between tile swaps
            const ANIM_DURATION_MIN = 20; // seconds
            const ANIM_DURATION_MAX = 35;

            const MAX_COMPONENTS = 200;
            const MAX_FILE_SIZE = 512 * 1024; // 512 KB source file
            const MAX_POOL = 8;
            const EXCLUDED_FORMATS = ['ODB++', 'Gerber/ODB++', 'GDSII'];

            // Compute grid size based on viewport — larger cells = fewer tiles
            const cellSize = 400;
            const cols = Math.max(2, Math.ceil(window.innerWidth / cellSize));
            const rows = Math.max(2, Math.ceil(window.innerHeight / cellSize));
            mosaic.style.setProperty('--mosaic-cols', cols);
            mosaic.style.setProperty('--mosaic-rows', rows);
            const totalCells = cols * rows;

            // Fetch recent and aggressively filter
            let thumbIds = [];
            try {
                const resp = await fetch('/api/recent');
                const entries = await resp.json();
                thumbIds = entries
                    .filter(e => {
                        const fmt = detectFormat(e.filename);
                        if (EXCLUDED_FORMATS.includes(fmt)) return false;
                        if (e.components > MAX_COMPONENTS) return false;
                        if (e.file_size && e.file_size > MAX_FILE_SIZE) return false;
                        return true;
                    })
                    .slice(0, MAX_POOL)
                    .map(e => e.id);
            } catch { return; }

            if (thumbIds.length < 2) return;

            function randomPick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

            function applyKenBurns(img) {
                const anim = randomPick(KB_ANIMS);
                const dur = ANIM_DURATION_MIN + Math.random() * (ANIM_DURATION_MAX - ANIM_DURATION_MIN);
                const dir = Math.random() > 0.5 ? 'alternate' : 'alternate-reverse';
                img.style.animation = `${anim} ${dur.toFixed(1)}s ease-in-out infinite ${dir}`;
            }

            // Pre-fetch SVGs and rasterize to PNG bitmaps via offscreen canvas.
            // Animating raw SVGs forces the browser to re-rasterize thousands of
            // paths every frame; bitmaps are GPU-friendly and essentially free.
            const RASTER_SIZE = 512;
            const uniqueIds = [...new Set(thumbIds)];
            const bitmapUrls = {};
            for (const id of uniqueIds) {
                try {
                    const r = await fetch(`/b/${id}/thumb.svg`);
                    if (!r.ok) continue;
                    const svgText = await r.text();
                    const svgBlob = new Blob([svgText], { type: 'image/svg+xml' });
                    const url = URL.createObjectURL(svgBlob);
                    const img = new Image();
                    await new Promise((resolve, reject) => {
                        img.onload = resolve;
                        img.onerror = reject;
                        img.src = url;
                    });
                    const canvas = document.createElement('canvas');
                    canvas.width = RASTER_SIZE;
                    canvas.height = RASTER_SIZE;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, RASTER_SIZE, RASTER_SIZE);
                    URL.revokeObjectURL(url);
                    bitmapUrls[id] = canvas.toDataURL('image/png');
                } catch { /* skip this thumbnail */ }
            }

            // Only use IDs that rasterized successfully
            thumbIds = thumbIds.filter(id => bitmapUrls[id]);
            if (thumbIds.length < 2) return;

            // Create cells with pre-fetched thumbnails
            const usedPerCell = [];
            let loaded = 0;
            for (let i = 0; i < totalCells; i++) {
                const cell = document.createElement('div');
                cell.className = 'mosaic-cell';
                const id = randomPick(thumbIds);
                usedPerCell.push(id);
                const img = document.createElement('img');
                img.src = bitmapUrls[id];
                img.alt = '';
                applyKenBurns(img);
                img.addEventListener('load', () => {
                    if (++loaded >= Math.min(4, totalCells)) mosaic.classList.add('visible');
                }, { once: true });
                cell.appendChild(img);
                mosaic.appendChild(cell);
            }

            // Cycle: periodically swap a random tile's image
            setInterval(() => {
                const idx = Math.floor(Math.random() * totalCells);
                const cell = mosaic.children[idx];
                const oldImg = cell.querySelector('img');

                // Pick a different thumbnail than what's currently shown
                let newId;
                do { newId = randomPick(thumbIds); } while (newId === usedPerCell[idx] && thumbIds.length > 1);
                usedPerCell[idx] = newId;

                // Crossfade: fade out old, add new behind it
                const newImg = document.createElement('img');
                newImg.src = bitmapUrls[newId];
                newImg.alt = '';
                newImg.style.opacity = '0';
                applyKenBurns(newImg);
                cell.insertBefore(newImg, oldImg);

                // Animate the swap
                requestAnimationFrame(() => {
                    newImg.style.transition = 'opacity 2s ease-in-out';
                    newImg.style.opacity = '1';
                    oldImg.classList.add('fading-out');
                    setTimeout(() => oldImg.remove(), 2200);
                });
            }, CYCLE_INTERVAL);
        })();

        dropzone.addEventListener('click', () => fileInput.click());
        dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
        dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
        dropzone.addEventListener('drop', e => {
            e.preventDefault();
            dropzone.classList.remove('dragover');
            if (e.dataTransfer.files.length) uploadFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', () => { if (fileInput.files.length) uploadFile(fileInput.files[0]); });

        async function uploadFile(file) {
            dropzone.classList.add('loading');
            result.className = 'result show';
            result.innerHTML = '<span class="spinner"></span>Generating BOM...';
            const formData = new FormData();
            formData.append('file', file);
            if (secretCheck.checked) formData.append('secret', 'true');
            try {
                const response = await fetch('/upload', { method: 'POST', body: formData });
                const text = await response.text();
                let data;
                try { data = JSON.parse(text); } catch { throw new Error(text || `Server error (${response.status})`); }
                if (!response.ok) throw new Error(data.error || 'Upload failed');
                saveToHistory({ url: data.url, filename: file.name });
                if (!secretCheck.checked) loadRecent();
                result.innerHTML = `
                    <p>Your PasteBOM is ready:</p>
                    <a href="${data.url}" target="_blank">${data.url}</a>
                    <button onclick="navigator.clipboard.writeText('${data.url}').then(()=>{this.textContent='Copied!';setTimeout(()=>this.textContent='Copy Link',2000)})">Copy Link</button>`;
            } catch (err) {
                result.classList.add('error');
                result.innerHTML = `<p>Error: ${err.message}</p>`;
            } finally {
                dropzone.classList.remove('loading');
            }
        }
    </script>
</body>
</html>
